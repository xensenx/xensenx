<rect x="40" y="108" width="600" height="1" fill="#253448" style="fill:rgb(37, 52, 72);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="40" y="136" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">I'm an independent software developer leveraging AI augmentation to accelerate the</text>
<text x="40" y="156" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">way I build and ship tools. My focus is to create useful software that actively reduces</text>
<text x="40" y="176" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">friction, whether by saving time or minimizing effort. I build every project around three</text>
<text x="40" y="196" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">core principles that I firmly believe good software must uphold:</text>

<rect x="40" y="216" width="600" height="1" fill="#253448" style="fill:rgb(37, 52, 72);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="40" y="246" font-family="Roboto Slab, serif" font-size="15.5" font-weight="700" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:15.5px;font-weight:700;text-anchor:start;dominant-baseline:auto">Privacy</text>
<text x="40" y="268" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">Although true privacy is becoming scarce in the modern digital era, it remains a</text>
<text x="40" y="288" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">foundational priority in my work. Giving users secure, private options is the only way</text>
<text x="40" y="308" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">to drive meaningful change.</text>

<rect x="40" y="326" width="600" height="1" fill="#253448" style="fill:rgb(37, 52, 72);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="40" y="356" font-family="Roboto Slab, serif" font-size="15.5" font-weight="700" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:15.5px;font-weight:700;text-anchor:start;dominant-baseline:auto">User Experience</text>
<text x="40" y="378" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">Because my ultimate goal is to eliminate friction, a clunky interface defeats the purpose.</text>
<text x="40" y="398" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">I design with UX at the forefront, ensuring my solutions are as intuitive to navigate as</text>
<text x="40" y="418" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">they are functional.</text>

<rect x="40" y="436" width="600" height="1" fill="#253448" style="fill:rgb(37, 52, 72);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<text x="40" y="466" font-family="Roboto Slab, serif" font-size="15.5" font-weight="700" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:15.5px;font-weight:700;text-anchor:start;dominant-baseline:auto">Reliability</text>
<text x="40" y="488" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">Good software should seamlessly fade into the background. A user shouldn't feel surprised</text>
<text x="40" y="508" font-family="Roboto Slab, serif" font-size="13.5" font-weight="300" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:300;text-anchor:start;dominant-baseline:auto">when a tool finally works; they should look back after months of use and realize,</text>
<text x="40" y="528" font-family="Roboto Slab, serif" font-size="13.5" font-weight="700" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Roboto Slab&quot;, serif;font-size:13.5px;font-weight:700;text-anchor:start;dominant-baseline:auto">"It just works."</text>
</svg>