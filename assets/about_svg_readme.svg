<text x="34" y="436" font-family="Syne, sans-serif" font-size="16" font-weight="700" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:16px;font-weight:700;text-anchor:start;dominant-baseline:auto">Reliability</text>
<text x="34" y="458" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">Good software should seamlessly fade into the background. A user shouldn't feel</text>
<text x="34" y="477" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">surprised when a tool finally works; they should look back after months of use and</text>
<text x="34" y="496" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">realize, "It just works."</text>
