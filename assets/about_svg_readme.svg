<text x="34" y="332" font-family="Syne, sans-serif" font-size="16" font-weight="700" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:16px;font-weight:700;text-anchor:start;dominant-baseline:auto">User Experience</text>
<text x="34" y="354" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">Because my ultimate goal is to eliminate friction, a clunky interface defeats the</text>
<text x="34" y="373" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">purpose. I design with UX at the forefront, ensuring my solutions are as intuitive</text>
<text x="34" y="392" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">to navigate as they are functional.</text>
