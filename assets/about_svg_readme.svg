<text x="34" y="90" font-family="Syne, sans-serif" font-size="22" font-weight="800" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:22px;font-weight:800;text-anchor:start;dominant-baseline:auto">About</text>
<rect x="34" y="102" width="612" height="1" fill="#1f2e42" style="fill:rgb(31, 46, 66);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="34" y="126" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">I'm an independent software developer leveraging AI augmentation to accelerate</text>
<text x="34" y="145" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">the way I build and ship tools. My focus is to create useful software that actively</text>
<text x="34" y="164" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">reduces friction, whether by saving time or minimizing effort. I build every project</text>
<text x="34" y="183" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">around three core principles that I firmly believe good software must uphold:</text>
<rect x="34" y="202" width="612" height="1" fill="#1f2e42" style="fill:rgb(31, 46, 66);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
<text x="34" y="228" font-family="Syne, sans-serif" font-size="16" font-weight="700" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:16px;font-weight:700;text-anchor:start;dominant-baseline:auto">Privacy</text>
<text x="34" y="250" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">Although true privacy is becoming scarce in the modern digital era, it remains a</text>
<text x="34" y="269" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">foundational priority in my work. Giving users secure, private options is the only</text>
<text x="34" y="288" font-family="Syne, sans-serif" font-size="14" font-weight="400" fill="#ffffff" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:14px;font-weight:400;text-anchor:start;dominant-baseline:auto">way to drive meaningful change.</text>
