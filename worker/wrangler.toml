# ============================================================
# wrangler.toml — xensenx Cloudflare Workers configuration
# Docs: https://developers.cloudflare.com/workers/configuration/
# ============================================================

name            = "xensenx"
main            = "worker/index.js"
compatibility_date = "2024-11-01"

# ─── STATIC ASSETS ──────────────────────────────────────────
# Cloudflare serves /public/** files via the ASSETS binding.
# The Worker script handles routing + auth on top.
[assets]
directory = "./public"
binding   = "ASSETS"

# ─── ENVIRONMENT: PRODUCTION ────────────────────────────────
[env.production]
name = "xensenx"

# ─── ENVIRONMENT: PREVIEW / STAGING ─────────────────────────
[env.preview]
name = "xensenx-preview"

# ─── OBSERVABILITY ──────────────────────────────────────────
[observability]
enabled = true

# ─── OPTIONAL: KV NAMESPACE FOR DYNAMIC WHITELIST ────────────
# Uncomment when you want to manage the whitelist without
# redeploying the Worker. See:
# https://developers.cloudflare.com/kv/
#
# [[kv_namespaces]]
# binding  = "AUTH_KV"
# id       = "YOUR_KV_NAMESPACE_ID_HERE"
# preview_id = "YOUR_PREVIEW_KV_ID_HERE"

# ─── OPTIONAL: CUSTOM DOMAIN ─────────────────────────────────
# [[routes]]
# pattern = "xensenx.com/*"
# zone_name = "xensenx.com"
